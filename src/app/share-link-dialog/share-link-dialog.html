<div fxLayout="row" fxLayoutAlign="space-between center">
    <h2 mat-dialog-title> Skopiuj link żeby udostępnić </h2>
    <button [mat-dialog-close]="false" mat-icon-button>
        <mat-icon>close</mat-icon>
    </button>
</div>
<mat-divider></mat-divider>
<mat-dialog-content class="dialog-content" fxLayout="column" fxLayoutAlign="center center" style="overflow-x: hidden">
    <div fxLayout="row" fxLayoutAlign="space-around center" fxLayoutGap="24px" style="width: 100%">
        <div fxLayout="column" fxLayoutAlign="center center" fxLayoutGap="8px" style="width: 120px">
            <span class="small-letters greyed">Typ linku</span>
            <mat-slide-toggle
                class="no-icon-toggle"
                color="primary"
                [(ngModel)]="shortUrlPicked"
                [disabled]="shortUrlNotAvailable"
                (change)="toggleClick()">
                {{ shortUrlPicked ? 'Skrócony' : 'Domyślny' }}
            </mat-slide-toggle>
        </div>
        <div fxLayout="column" fxLayoutAlign="center center" fxLayoutGap="8px" style="width: 120px">
            <span class="small-letters greyed">Nazwa</span>
            <mat-slide-toggle
                class="no-icon-toggle"
                color="primary"
                [(ngModel)]="copyWithName"
                (change)="toggleClick()">
                {{ copyWithName ? 'Z nazwą' : 'Bez nazwy' }}
            </mat-slide-toggle>
        </div>
    </div>

    <div fxLayout="column" fxLayoutAlign="center center" class="hide-overflow" style="margin-top: 20px">
        <div *ngIf="copyWithName && !(shortUrlPicked && shortUrlNotAvailable)"> {{ data.splitsonName }}: </div>
        <div *ngIf="!copyWithName || shortUrlPicked && shortUrlNotAvailable" style="height: 24px"> </div>
        <div fxLayout="row" style="max-width: 230px;">
            <div *ngIf="!shortUrlPicked" class="hide-overflow">
                <div class="hide-overflow"> {{ data.longUrl }} </div>
            </div>
        
            <div *ngIf="shortUrlPicked" class="hide-overflow">
                <div *ngIf="shortUrlNotAvailable" class="hide-overflow"> Skrócony link niedostępny </div>
                <div *ngIf="!shortUrlNotAvailable" class="hide-overflow"> {{ data.shortUrl }} </div>
            </div>
        </div>
    </div>

</mat-dialog-content>
<mat-dialog-actions class="dialog-actions" fxLayout="row" fxLayoutAlign="center center">
    <button mat-stroked-button 
            [cdkCopyToClipboard]="getDataToCopy()" 
            color="primary" 
            (click)="copy()" 
            [disabled]="shortUrlPicked && shortUrlNotAvailable"> 
        {{ copied ? "Skopiowano!" : "Kopiuj" }}
    </button>
</mat-dialog-actions>
