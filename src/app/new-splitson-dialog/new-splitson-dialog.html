<div fxLayout="row" fxLayoutAlign="space-between center">
    <h2 mat-dialog-title> Nowy Splitson </h2>
    <button  mat-icon-button (click)="onBackClick()">
        <mat-icon>close</mat-icon>
    </button>
</div>
<mat-divider></mat-divider>
<mat-dialog-content class="dialog-content">
    <form [formGroup]="newSplitsonForm">
        <mat-form-field style="width: 100%;">
            <input matInput #input formControlName="name" autocomplete="off">
            <button *ngIf="input.value" matSuffix mat-icon-button (click)="clear()">
                <mat-icon>close</mat-icon>
              </button>
            <mat-hint align="end"> {{ input.value.length }}/{{ maxLength }} </mat-hint>
        </mat-form-field>
        <mat-form-field style="width: 100%;">
            <mat-label>Data</mat-label>
            <input matInput type="date" formControlName="date">
        </mat-form-field>
        <div fxLayout="row" fxLayoutAlign="center center" >
            <mat-selection-list>
                <mat-list-option color="primary" [selected]="keepUsers" (click)="toggleKeepUsers()">
                    Zachowaj użytkowników
                </mat-list-option>
                <mat-list-option color="primary" [selected]="keepCurrencies" (click)="toggleKeepCurrencies()">
                    Zachowaj ustawienia walut
                </mat-list-option>
            </mat-selection-list>
        </div>
    </form>
</mat-dialog-content>
<mat-dialog-actions class="dialog-actions" fxLayout="column" fxLayoutAlign="center center">
    <span style="color: grey; font-size: 12px; margin-bottom: 8px;">Bieżący Splitson zostanie zarchiwizowany</span>
    <button mat-stroked-button color="primary" [disabled]="!newSplitsonForm.valid" (click)="save()"> Stwórz </button>
</mat-dialog-actions>
