<div class="records-container">
<mat-list #recordsList>
    <div *ngIf="records.length == 0" class="greyed" fxFill fxLayoutAlign="center center"> Brak wydatków </div>
    <div *ngFor="let record of records; let lastItem = last;">
        <app-expense-tile
            [record]="record"
            [currencyProfile]="currencyProfile"
            (click)="assignUsers(record.id)">
        </app-expense-tile>
        <mat-divider *ngIf="!lastItem" class="divider"></mat-divider>
    </div>
</mat-list>

<app-bottom-panel
    [leftLabel]="'Rozliczone rekordy' | uppercase"
    [leftValue]="getAssignedRecordsNumber() + ' / ' + records.length"
    [rightLabel]="'Całkowity koszt' | uppercase"
    [rightValue]="(getPriceSum() | number:'1.2-2') + ' ' + currencyProfile.paidCurrency.short"
    [showAddButton]="true"
    (addClick)="addRecords()">
</app-bottom-panel>
</div>
